services:
  api_santos:
    image: ghcr.io/jotave07/vexor_api_winthor:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: info
      CORS_ORIGIN: "*"
      API_KEY: "CHANGE_ME"
      ORACLE_DRIVER_MODE: thick
      ORACLE_USER: "WINTHOR"
      ORACLE_PASSWORD: "CHANGE_ME"
      ORACLE_CONNECT_STRING: "(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=santosdistribuidor.ddns.net)(PORT=1521))(CONNECT_DATA=(SID=WINT)))"
      ORACLE_CONFIG_DIR: ""
      ORACLE_CLIENT_LIB_DIR: "/opt/oracle/instantclient"
      ORACLE_POOL_MIN: "1"
      ORACLE_POOL_MAX: "10"
      ORACLE_POOL_INCREMENT: "1"
      ORACLE_QUEUE_TIMEOUT_MS: "5000"
      ORACLE_CONNECT_TIMEOUT_MS: "10000"
      ORACLE_CALL_TIMEOUT_MS: "15000"
      DEFAULT_PAGE_SIZE: "20"
      MAX_PAGE_SIZE: "100"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api_santos
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
